<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f2942"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <circle cx="60" cy="60" r="120" fill="url(#accent)" opacity="0.08"/>
  <circle cx="560" cy="360" r="150" fill="url(#accent)" opacity="0.08"/>

  <!-- POS terminal -->
  <g transform="translate(230,150)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#0b1220" stroke="url(#accent)" stroke-width="2.5"/>
    <rect x="12" y="12" width="116" height="60" rx="4" fill="#111a2e"/>
    <rect x="20" y="20" width="60" height="8" rx="2" fill="url(#accent)" opacity="0.85"/>
    <rect x="20" y="34" width="90" height="6" rx="2" fill="#3b4a63"/>
    <rect x="20" y="46" width="70" height="6" rx="2" fill="#3b4a63"/>
    <rect x="20" y="58" width="40" height="6" rx="2" fill="#3b4a63"/>
    <rect x="40" y="100" width="60" height="14" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
    <rect x="20" y="114" width="100" height="8" rx="4" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
  </g>

  <!-- Receipt -->
  <g transform="translate(120,140)">
    <path d="M0 0 H70 V115 L63 108 L56 115 L49 108 L42 115 L35 108 L28 115 L21 108 L14 115 L7 108 L0 115 Z" fill="#f1f5f9"/>
    <rect x="12" y="16" width="46" height="5" rx="2" fill="#94a3b8"/>
    <rect x="12" y="28" width="34" height="5" rx="2" fill="#cbd5e1"/>
    <rect x="12" y="40" width="46" height="5" rx="2" fill="#cbd5e1"/>
    <rect x="12" y="52" width="26" height="5" rx="2" fill="#cbd5e1"/>
    <rect x="12" y="70" width="46" height="6" rx="2" fill="#2563eb"/>
  </g>

  <!-- Coffee cup -->
  <g transform="translate(370,130)">
    <path d="M6 20 H74 L68 90 A16 16 0 0 1 52 104 H28 A16 16 0 0 1 12 90 Z" fill="#111a2e" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M74 32 H90 A14 14 0 0 1 90 60 H72" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <ellipse cx="40" cy="20" rx="34" ry="8" fill="url(#accent)" opacity="0.9"/>
    <path d="M22 -6 Q28 4 22 12 M40 -10 Q46 0 40 8 M58 -6 Q64 4 58 12" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <text x="300" y="330" text-anchor="middle" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="26" fill="#e2e8f0">Sabha Koffie POS</text>
  <text x="300" y="356" text-anchor="middle" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8">Point of Sale System</text>
</svg>
